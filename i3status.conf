# Omarchy-inspired status line for i3bar.
general {
    colors = true
    interval = 5
    color_good = "#e68e0d"
    color_degraded = "#ffc107"
    color_bad = "#d35f5f"
}

order += "wireless _first_"
order += "ethernet _first_"
order += "battery all"
order += "tztime local"

wireless _first_ {
    format_up = "󰤨 %quality%%"
    format_down = "󰤮"
}

ethernet _first_ {
    format_up = "󰀂"
    format_down = "󰌙"
}

battery all {
    format = "%status %percentage%%"
    format_down = ""
    status_chr = "󰂄"
    status_bat = "󰁹"
    status_full = "󰁹"
    status_unk = "?"
}

tztime local {
    format = "%a %H:%M"
}
